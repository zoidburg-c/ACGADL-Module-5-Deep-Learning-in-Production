<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #114060;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 6pt;
    background-color: #F48200;
  }
  .left-strip {
    position: absolute;
    top: 0; left: 0;
    width: 8pt; height: 405pt;
    background-color: #1B75BC;
  }
  .content {
    text-align: center;
    padding: 0 60pt;
  }
  .content h1 {
    font-family: Arial, sans-serif;
    font-size: 26pt;
    color: #FFFFFF;
    font-weight: bold;
    margin-bottom: 14pt;
    line-height: 1.3;
  }
  .content h2 {
    font-family: Arial, sans-serif;
    font-size: 18pt;
    color: #33B6FF;
    font-weight: normal;
    margin-bottom: 40pt;
    line-height: 1.3;
  }
  .divider {
    position: absolute;
    top: 245pt;
    left: 260pt;
    width: 200pt;
    height: 3pt;
    background-color: #F48200;
  }
  .footer-text {
    font-family: Arial, sans-serif;
    font-size: 10pt;
    color: #33B6FF;
    position: absolute;
    bottom: 25pt;
    left: 0;
    width: 720pt;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="left-strip"></div>
  <div class="content">
    <h1>Session 5: Implementing Retrieval-Augmented Generation (RAG)</h1>
    <h2>Module 5: Deep Learning in Production</h2>
  </div>
  <div class="divider"></div>
  <p class="footer-text">SMU Academy  |  Advanced Certificate in Generative AI and Deep Learning</p>
</body>
</html>
