<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .list-area {
    padding: 36pt 45pt 0 65pt;
  }
  .list-area ul {
    list-style: none;
  }
  .list-area ul li {
    font-size: 14pt;
    color: #114060;
    line-height: 1.4;
    margin-bottom: 14pt;
    padding-left: 22pt;
    position: relative;
  }
  .list-area ul li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6pt;
    width: 10pt;
    height: 10pt;
    background-color: #F48200;
    border-radius: 2pt;
  }
  .highlight-box {
    position: absolute;
    bottom: 40pt;
    left: 45pt;
    right: 45pt;
    background-color: #FFF3E0;
    border-radius: 6pt;
    border-left: 4pt solid #F48200;
    padding: 12pt 16pt;
  }
  .highlight-box p {
    font-size: 12pt;
    color: #114060;
    line-height: 1.4;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>AWS Cost Management Tips</h1>
  </div>
  <div class="underline"></div>
  <div class="list-area">
    <ul>
      <li>Always delete endpoints when not in use</li>
      <li>Use spot instances for training (up to 90% savings)</li>
      <li>Start with smallest instance type (ml.t2.medium)</li>
      <li>Set CloudWatch billing alerts</li>
      <li>Use auto-scaling for variable workloads</li>
    </ul>
  </div>
  <div class="footer-line"></div>
</body>
</html>
