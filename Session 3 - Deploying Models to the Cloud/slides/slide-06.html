<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .services {
    display: flex;
    flex-wrap: wrap;
    gap: 14pt;
    padding: 38pt 45pt 0 45pt;
    justify-content: center;
  }
  .service {
    width: 190pt;
    height: 110pt;
    border-radius: 6pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12pt;
  }
  .service-teal { background-color: #1B75BC; }
  .service-dark { background-color: #114060; }
  .service-orange { background-color: #F48200; }
  .service p {
    color: #FFFFFF;
    line-height: 1.3;
  }
  .service-name {
    font-size: 15pt;
    font-weight: bold;
    margin-bottom: 6pt;
  }
  .service-desc {
    font-size: 11pt;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>AWS Services for ML</h1>
  </div>
  <div class="underline"></div>
  <div class="services">
    <div class="service service-teal">
      <p class="service-name">SageMaker</p>
      <p class="service-desc">End-to-end ML platform</p>
    </div>
    <div class="service service-dark">
      <p class="service-name">ECR</p>
      <p class="service-desc">Container registry</p>
    </div>
    <div class="service service-teal">
      <p class="service-name">S3</p>
      <p class="service-desc">Object storage</p>
    </div>
    <div class="service service-orange">
      <p class="service-name">CloudWatch</p>
      <p class="service-desc">Monitoring and logging</p>
    </div>
    <div class="service service-dark">
      <p class="service-name">Lambda</p>
      <p class="service-desc">Serverless compute</p>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
