<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .boxes {
    display: flex;
    flex-wrap: wrap;
    gap: 16pt;
    padding: 40pt 45pt 0 45pt;
    justify-content: center;
  }
  .box {
    width: 175pt;
    height: 100pt;
    background-color: #1B75BC;
    border-radius: 6pt;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .box p {
    font-size: 15pt;
    color: #FFFFFF;
    font-weight: bold;
    line-height: 1.3;
  }
  .box-accent {
    background-color: #F48200;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Why Deploy to the Cloud?</h1>
  </div>
  <div class="underline"></div>
  <div class="boxes">
    <div class="box">
      <p>Scalability</p>
    </div>
    <div class="box">
      <p>Availability</p>
    </div>
    <div class="box">
      <p>Managed Infrastructure</p>
    </div>
    <div class="box box-accent">
      <p>Pay-per-use</p>
    </div>
    <div class="box box-accent">
      <p>GPU Access</p>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
