<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #114060;
    display: flex;
    flex-direction: column;
  }
  .accent-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 6pt;
    background-color: #F48200;
  }
  .left-strip {
    position: absolute;
    top: 0; left: 0;
    width: 8pt; height: 405pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 35pt 50pt 0 50pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #F48200;
    font-weight: bold;
    line-height: 1.3;
  }
  .divider {
    position: absolute;
    top: 72pt; left: 50pt;
    width: 70pt; height: 3pt;
    background-color: #33B6FF;
  }
  .list-area {
    padding: 24pt 50pt 0 70pt;
  }
  .list-area ul {
    list-style: none;
  }
  .list-area ul li {
    font-size: 14pt;
    color: #FFFFFF;
    line-height: 1.4;
    margin-bottom: 16pt;
    padding-left: 22pt;
    position: relative;
  }
  .list-area ul li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 6pt;
    width: 10pt;
    height: 10pt;
    background-color: #F48200;
    border-radius: 2pt;
  }
  .next-session {
    position: absolute;
    bottom: 35pt;
    left: 50pt;
    right: 50pt;
    background-color: #1B75BC;
    border-radius: 6pt;
    padding: 12pt 18pt;
  }
  .next-session p {
    font-size: 13pt;
    color: #FFFFFF;
    line-height: 1.3;
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="left-strip"></div>
  <div class="title-area">
    <h1>Key Takeaways</h1>
  </div>
  <div class="divider"></div>
  <div class="list-area">
    <ul>
      <li>Docker containers ensure reproducible ML environments</li>
      <li>SageMaker simplifies the entire deployment lifecycle</li>
      <li>Always monitor deployed models for drift and errors</li>
      <li>Cost management is critical — always clean up!</li>
    </ul>
  </div>
  <div class="next-session">
    <p><span style="font-weight:bold;color:#F48200;">Next:</span> Session 4 — On-Premise Deployment</p>
  </div>
</body>
</html>
