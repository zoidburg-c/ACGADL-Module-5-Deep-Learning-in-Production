<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .flow-container {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 55pt 30pt 0 30pt;
    gap: 6pt;
  }
  .step {
    width: 112pt;
    height: 105pt;
    background-color: #1B75BC;
    border-radius: 6pt;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8pt;
  }
  .step-alt { background-color: #114060; }
  .step-accent { background-color: #F48200; }
  .step-num {
    width: 26pt;
    height: 26pt;
    background-color: #F48200;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8pt;
  }
  .step-alt .step-num { background-color: #1B75BC; }
  .step-accent .step-num { background-color: #1B75BC; }
  .step-num p {
    font-size: 12pt;
    color: #FFFFFF;
    font-weight: bold;
  }
  .step p {
    font-size: 11pt;
    color: #FFFFFF;
    line-height: 1.3;
  }
  .step-label {
    font-weight: bold;
  }
  .arrow {
    width: 20pt;
    height: 30pt;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .arrow p {
    font-size: 22pt;
    color: #1B75BC;
    font-weight: bold;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>SageMaker Deployment Workflow</h1>
  </div>
  <div class="underline"></div>
  <div class="flow-container">
    <div class="step">
      <div class="step-num"><p>1</p></div>
      <p class="step-label">Upload Model</p>
      <p>to S3</p>
    </div>
    <div class="arrow"><p>&rarr;</p></div>
    <div class="step step-alt">
      <div class="step-num"><p>2</p></div>
      <p class="step-label">Create Model</p>
      <p>in SageMaker</p>
    </div>
    <div class="arrow"><p>&rarr;</p></div>
    <div class="step">
      <div class="step-num"><p>3</p></div>
      <p class="step-label">Endpoint Config</p>
      <p>Instance type</p>
    </div>
    <div class="arrow"><p>&rarr;</p></div>
    <div class="step step-alt">
      <div class="step-num"><p>4</p></div>
      <p class="step-label">Deploy</p>
      <p>Endpoint</p>
    </div>
    <div class="arrow"><p>&rarr;</p></div>
    <div class="step step-accent">
      <div class="step-num"><p>5</p></div>
      <p class="step-label">Send</p>
      <p>Requests</p>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
