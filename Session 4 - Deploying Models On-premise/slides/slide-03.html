<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .table-container {
    padding: 45pt 45pt 0 45pt;
  }
  .table-header {
    display: flex;
    gap: 0;
  }
  .th {
    flex: 1;
    padding: 12pt 16pt;
    background-color: #1B75BC;
  }
  .th p {
    font-size: 14pt;
    color: #FFFFFF;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }
  .th-left {
    border-radius: 6pt 0 0 0;
  }
  .th-right {
    border-radius: 0 6pt 0 0;
  }
  .table-row {
    display: flex;
    gap: 0;
  }
  .td {
    flex: 1;
    padding: 10pt 16pt;
    border-bottom: 1pt solid #E0E0E0;
  }
  .td p {
    font-size: 12pt;
    color: #114060;
    line-height: 1.4;
  }
  .td-alt {
    background-color: #f7f7f7;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>When to Choose What?</h1>
  </div>
  <div class="underline"></div>
  <div class="table-container">
    <div class="table-header">
      <div class="th th-left"><p>Cloud</p></div>
      <div class="th th-right"><p>On-Premise</p></div>
    </div>
    <div class="table-row">
      <div class="td td-alt"><p>Elastic scaling on demand</p></div>
      <div class="td td-alt"><p>Data privacy requirements</p></div>
    </div>
    <div class="table-row">
      <div class="td"><p>Quick setup, no hardware</p></div>
      <div class="td"><p>Stable, predictable workload</p></div>
    </div>
    <div class="table-row">
      <div class="td td-alt"><p>Variable or unpredictable load</p></div>
      <div class="td td-alt"><p>Regulatory compliance needs</p></div>
    </div>
    <div class="table-row">
      <div class="td"><p>Pay-per-use cost model</p></div>
      <div class="td"><p>Existing hardware investment</p></div>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
