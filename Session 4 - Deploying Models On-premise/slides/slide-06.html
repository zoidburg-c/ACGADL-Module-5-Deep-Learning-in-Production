<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .content-area {
    padding: 40pt 45pt 0 45pt;
    display: flex;
    flex-direction: column;
    gap: 16pt;
  }
  .info-row {
    display: flex;
    gap: 16pt;
  }
  .info-label {
    width: 120pt;
    background-color: #1B75BC;
    border-radius: 6pt;
    padding: 14pt 16pt;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .info-label p {
    font-size: 13pt;
    color: #FFFFFF;
    font-weight: bold;
    text-align: center;
    line-height: 1.3;
  }
  .info-content {
    flex: 1;
    background-color: #f7f7f7;
    border-radius: 6pt;
    padding: 14pt 16pt;
    display: flex;
    align-items: center;
  }
  .info-content p {
    font-size: 13pt;
    color: #114060;
    line-height: 1.4;
  }
  .highlight-box {
    background-color: #114060;
    border-radius: 6pt;
    padding: 16pt 20pt;
    margin-top: 4pt;
  }
  .highlight-box p {
    font-size: 13pt;
    color: #F48200;
    font-weight: bold;
    text-align: center;
    line-height: 1.4;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Apple Silicon for ML</h1>
  </div>
  <div class="underline"></div>
  <div class="content-area">
    <div class="info-row">
      <div class="info-label"><p>What</p></div>
      <div class="info-content"><p>M1/M2/M3/M4 chips with unified memory architecture</p></div>
    </div>
    <div class="info-row">
      <div class="info-label"><p>Why It Matters</p></div>
      <div class="info-content"><p>Large models fit in shared CPU/GPU memory (up to 192 GB)</p></div>
    </div>
    <div class="info-row">
      <div class="info-label"><p>Advantage</p></div>
      <div class="info-content"><p>Cost-effective for inference workloads, no separate GPU needed</p></div>
    </div>
    <div class="highlight-box">
      <p>Unified memory eliminates data transfer bottleneck between CPU and GPU</p>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
