<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .content-area {
    padding: 40pt 45pt 0 45pt;
    display: flex;
    gap: 20pt;
  }
  .left-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 14pt;
  }
  .info-row {
    display: flex;
    gap: 10pt;
    align-items: flex-start;
  }
  .label-box {
    width: 60pt;
    background-color: #1B75BC;
    border-radius: 4pt;
    padding: 8pt 6pt;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label-box p {
    font-size: 11pt;
    color: #FFFFFF;
    font-weight: bold;
    text-align: center;
    line-height: 1.2;
  }
  .desc-box {
    flex: 1;
    display: flex;
    align-items: center;
  }
  .desc-box p {
    font-size: 12pt;
    color: #114060;
    line-height: 1.4;
  }
  .right-col {
    width: 260pt;
  }
  .types-box {
    background-color: #114060;
    border-radius: 6pt;
    padding: 18pt 16pt;
    margin-bottom: 14pt;
  }
  .types-box h3 {
    font-size: 13pt;
    color: #F48200;
    font-weight: bold;
    margin-bottom: 10pt;
    line-height: 1.3;
  }
  .types-box ul {
    padding-left: 16pt;
  }
  .types-box li {
    font-size: 12pt;
    color: #FFFFFF;
    line-height: 1.6;
  }
  .tools-box {
    background-color: #1B75BC;
    border-radius: 6pt;
    padding: 14pt 16pt;
  }
  .tools-box h3 {
    font-size: 12pt;
    color: #F48200;
    font-weight: bold;
    margin-bottom: 6pt;
    line-height: 1.3;
  }
  .tools-box p {
    font-size: 11pt;
    color: #FFFFFF;
    line-height: 1.4;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Distributed Inference</h1>
  </div>
  <div class="underline"></div>
  <div class="content-area">
    <div class="left-col">
      <div class="info-row">
        <div class="label-box"><p>When</p></div>
        <div class="desc-box"><p>Models too large for a single device</p></div>
      </div>
      <div class="info-row">
        <div class="label-box"><p>How</p></div>
        <div class="desc-box"><p>Split model across multiple machines</p></div>
      </div>
    </div>
    <div class="right-col">
      <div class="types-box">
        <h3>Parallelism Types</h3>
        <ul>
          <li>Model parallelism</li>
          <li>Data parallelism</li>
          <li>Pipeline parallelism</li>
        </ul>
      </div>
      <div class="tools-box">
        <h3>Key Tools</h3>
        <p>vLLM, text-generation-inference</p>
      </div>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
