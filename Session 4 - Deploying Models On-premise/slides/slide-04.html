<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .content-area {
    padding: 40pt 45pt 0 45pt;
    display: flex;
    gap: 24pt;
  }
  .left-col {
    flex: 1;
  }
  .right-col {
    flex: 1;
  }
  .section-label {
    font-size: 11pt;
    color: #F48200;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 10pt;
    line-height: 1.3;
  }
  .component-list {
    padding-left: 18pt;
  }
  .component-list li {
    font-size: 13pt;
    color: #114060;
    line-height: 1.6;
    margin-bottom: 4pt;
  }
  .hw-box {
    background-color: #114060;
    border-radius: 6pt;
    padding: 18pt 20pt;
    margin-top: 10pt;
  }
  .hw-box h3 {
    font-size: 12pt;
    color: #F48200;
    font-weight: bold;
    margin-bottom: 8pt;
    line-height: 1.3;
  }
  .hw-box p {
    font-size: 12pt;
    color: #FFFFFF;
    line-height: 1.5;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Industry Standard: Linux + Nvidia GPUs</h1>
  </div>
  <div class="underline"></div>
  <div class="content-area">
    <div class="left-col">
      <p class="section-label">Key Components</p>
      <ul class="component-list">
        <li>Linux server (Ubuntu/RHEL)</li>
        <li>Nvidia GPU with CUDA toolkit</li>
        <li>Docker + Nvidia Container Runtime</li>
        <li>Model serving framework</li>
      </ul>
    </div>
    <div class="right-col">
      <div class="hw-box">
        <h3>Common GPU Hardware</h3>
        <p>A100 (data centre, 80 GB)</p>
        <p>H100 (next-gen, fastest)</p>
        <p>RTX 4090 (cost-effective)</p>
      </div>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
