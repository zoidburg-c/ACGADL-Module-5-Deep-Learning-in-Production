<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .features {
    display: flex;
    flex-wrap: wrap;
    gap: 14pt;
    padding: 40pt 45pt 0 45pt;
  }
  .feature {
    width: 300pt;
    background-color: #f7f7f7;
    border-radius: 6pt;
    padding: 16pt 18pt;
    border-left: 4pt solid #1B75BC;
  }
  .feature h3 {
    font-size: 13pt;
    color: #1B75BC;
    font-weight: bold;
    margin-bottom: 5pt;
    line-height: 1.3;
  }
  .feature p {
    font-size: 11pt;
    color: #114060;
    line-height: 1.4;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Apple MLX Framework</h1>
  </div>
  <div class="underline"></div>
  <div class="features">
    <div class="feature">
      <h3>NumPy-like API</h3>
      <p>Familiar to Python developers, easy adoption</p>
    </div>
    <div class="feature">
      <h3>Optimised for Apple Silicon</h3>
      <p>Native Metal acceleration on M-series chips</p>
    </div>
    <div class="feature">
      <h3>Lazy Evaluation</h3>
      <p>Computations only run when results are needed</p>
    </div>
    <div class="feature">
      <h3>Unified Memory</h3>
      <p>No CPU/GPU data transfers, zero-copy sharing</p>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
