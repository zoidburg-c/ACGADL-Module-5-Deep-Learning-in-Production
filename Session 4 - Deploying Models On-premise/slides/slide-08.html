<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 720pt; height: 405pt;
    font-family: Arial, sans-serif;
    background-color: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
  .title-area {
    padding: 30pt 45pt 0 45pt;
  }
  .title-area h1 {
    font-size: 24pt;
    color: #1B75BC;
    font-weight: bold;
    line-height: 1.3;
  }
  .underline {
    position: absolute;
    top: 62pt; left: 45pt;
    width: 80pt; height: 3pt;
    background-color: #F48200;
  }
  .content-area {
    padding: 40pt 45pt 0 45pt;
    display: flex;
    gap: 20pt;
  }
  .left-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12pt;
  }
  .info-item {
    display: flex;
    gap: 10pt;
  }
  .info-tag {
    width: 60pt;
    background-color: #F48200;
    border-radius: 4pt;
    padding: 8pt 6pt;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .info-tag p {
    font-size: 11pt;
    color: #FFFFFF;
    font-weight: bold;
    text-align: center;
    line-height: 1.2;
  }
  .info-desc {
    flex: 1;
    display: flex;
    align-items: center;
  }
  .info-desc p {
    font-size: 12pt;
    color: #114060;
    line-height: 1.4;
  }
  .right-col {
    width: 240pt;
  }
  .models-box {
    background-color: #114060;
    border-radius: 6pt;
    padding: 18pt 16pt;
  }
  .models-box h3 {
    font-size: 13pt;
    color: #F48200;
    font-weight: bold;
    margin-bottom: 10pt;
    line-height: 1.3;
  }
  .models-box ul {
    padding-left: 16pt;
  }
  .models-box li {
    font-size: 12pt;
    color: #FFFFFF;
    line-height: 1.6;
  }
  .footer-line {
    position: absolute;
    bottom: 0; left: 0;
    width: 720pt; height: 4pt;
    background-color: #1B75BC;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="title-area">
    <h1>Ollama: Run LLMs Locally</h1>
  </div>
  <div class="underline"></div>
  <div class="content-area">
    <div class="left-col">
      <div class="info-item">
        <div class="info-tag"><p>What</p></div>
        <div class="info-desc"><p>Easy way to download and run open-source LLMs</p></div>
      </div>
      <div class="info-item">
        <div class="info-tag"><p>How</p></div>
        <div class="info-desc"><p>One command to pull and run models</p></div>
      </div>
      <div class="info-item">
        <div class="info-tag"><p>API</p></div>
        <div class="info-desc"><p>Local REST API on port 11434</p></div>
      </div>
    </div>
    <div class="right-col">
      <div class="models-box">
        <h3>Supported Models</h3>
        <ul>
          <li>Llama 3</li>
          <li>Mistral</li>
          <li>Phi</li>
          <li>Gemma</li>
          <li>And many more</li>
        </ul>
      </div>
    </div>
  </div>
  <div class="footer-line"></div>
</body>
</html>
